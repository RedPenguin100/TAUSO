name: Build and Test Python

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest ]
    runs-on: ${{ matrix.os }}

    env:
      TAUSO_DATA_DIR: ~/.tauso_data

    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # We don't need to mount a new volume, just delete junk
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      # Now we have ~30GB free space

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Compute env hash
        id: envhash
        run: echo "hash=$(cat environment.yml environment-dev.yml | sha256sum | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-file: environment.yml
          environment-name: tauso
          cache-env: true
          cache-downloads: true
          cache-environment-key: ${{ runner.os }}-tauso-${{ steps.envhash.outputs.hash }}
          # init-shell: bash  <-- You usually don't need this line if you use 'shell: bash -el {0}' above

      - name: Install Dev Dependencies
        run: micromamba install -n tauso -f environment-dev.yml -y


      - name: Install tauso
        run: micromamba run -n tauso pip install -e .

      - name: Install raccess
        run: tauso install-raccess

      - name: Cache Genome Database
        id: cache-genome
        uses: actions/cache@v4
        with:
          path: | 
           ~/.tauso_data/GRCh38_bowtie_index
           ~/.tauso_data/GRCh38.db
           ~/.tauso_data/GRCh38.db.bak
           ~/.tauso_data/GRCh38.db.successs
           ~/.tauso_data/GRCh38.fa
           ~/.tauso_data/GRCh38.fa.fai
           ~/.tauso_data/GRCh38.gtf

          key: ${{ runner.os }}-tauso.genome-GRCh38-v1
      - name: Install genome
        run: tauso setup-genome
#      - name: Process Oligo Data
#        run: python -m notebooks.competitors.oligo_ai.find_gene_from_context
#      - name: Index Oligo Data
#        run: python -m notebooks.utils.data
