name: Build and Test Python

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * *' # 3:00 AM UTC -> 6:00 AM Israel Daylight Time

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-file: conda-linux-64-dev.lock
          environment-name: tauso
          cache-downloads: true
          cache-environment: true
          cache-environment-key: ${{ runner.os }}-tauso-${{ hashFiles('conda-linux-64-dev.lock') }}

      - name: Run Ruff Check (Linting)
        run: micromamba run -n tauso ruff check src/

      - name: Run Ruff Format (Style)
        run: micromamba run -n tauso ruff format --check src/

      - name: Type check (mypy, informational — non-blocking)
        continue-on-error: true
        run: |
          micromamba run -n tauso uv pip install mypy
          micromamba run -n tauso mypy || true

  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest ]
    runs-on: ${{ matrix.os }}

    env:
      TAUSO_DATA_DIR: /home/runner/.tauso_data

    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Free Disk Space
        # Intentionally no `wait` — deletions run in the background while
        # checkout and micromamba proceed. This is safe in practice because
        # by the time Bowtie cache restore needs the space, the rms are done.
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet &
          sudo rm -rf /usr/local/lib/android &
          sudo rm -rf /opt/ghc &
          sudo rm -rf /opt/hostedtoolcache/CodeQL &
          sudo rm -rf /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" &
          echo "Deletions running in background. Current disk:"
          df -h /

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Create Data Directory
        run: mkdir -p "${{ env.TAUSO_DATA_DIR }}"

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-file: conda-linux-64-dev.lock
          environment-name: tauso
          cache-downloads: true
          cache-environment: true
          cache-environment-key: ${{ runner.os }}-tauso-${{ hashFiles('conda-linux-64-dev.lock') }}

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-uv-

      - name: Install tauso
        run: micromamba run -n tauso uv pip install -e ".[dev]"

      - name: Install raccess
        run: tauso setup-raccess

      # The coordinate-only locus pickle (built by `setup-genome`) is cached here too,
      # which skips its ~24s gffutils traversal. It lives in THIS cache rather than a
      # separate one so it is restored with the same preserved mtime ordering as the
      # gff db — the loader rebuilds the pickle if it looks older than GRCh38.gff3.db.
      - name: Cache Genome Database
        id: cache-genome
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.TAUSO_DATA_DIR }}/GRCh38.gff3.db
            ${{ env.TAUSO_DATA_DIR }}/GRCh38.gff3.db.success
            ${{ env.TAUSO_DATA_DIR }}/GRCh38.gtf.db
            ${{ env.TAUSO_DATA_DIR }}/GRCh38.gtf.db.success
            ${{ env.TAUSO_DATA_DIR }}/GRCh38.fa
            ${{ env.TAUSO_DATA_DIR }}/GRCh38.fa.fai
            ${{ env.TAUSO_DATA_DIR }}/GRCh38.gtf.gz
            ${{ env.TAUSO_DATA_DIR }}/GRCh38.locus.v1.introns1.canon1.pkl
          key: ${{ runner.os }}-tauso.genome-GRCh38-v5

      - name: Install genome
        run: tauso setup-genome

      - name: Cache and Setup Bowtie
        uses: ./.github/actions/setup-bowtie-cached
        with:
          os: ${{ runner.os }}
          data_dir: ${{ env.TAUSO_DATA_DIR }}

      - name: Build Oligo Data (download, split, canonical gene, index)
        run: python notebooks/data/OligoAI/setup_data.py --skip-process

      - name: Cache mRNA Half Life
        uses: actions/cache@v4
        with:
          path: ${{ env.TAUSO_DATA_DIR }}/mrna_half_life.parquet
          key: mrna-halflife-v2

      - name: Setup mRNA half life
        run: tauso setup-mrna-halflife

      - name: Cache ATtRACT RBP data
        uses: actions/cache@v4
        with:
          path: ${{ env.TAUSO_DATA_DIR }}/attract
          key: attract-zenodo-20366079

      - name: Setup ATtRACT RBP data
        run: tauso setup-attract

      - name: Cache RiboSeq data
        uses: actions/cache@v4
        with:
          path: ${{ env.TAUSO_DATA_DIR }}/human_unselected_40S.RiboProElong.bw
          key: riboseq-zenodo-20366983

      - name: Setup RiboSeq data
        run: tauso setup-riboseq

      - name: Cache DepMap Data
        id: cache-depmap
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.TAUSO_DATA_DIR }}/Model.csv
            ${{ env.TAUSO_DATA_DIR }}/OmicsProfiles.csv
            ${{ env.TAUSO_DATA_DIR }}/OmicsExpressionTPMLogp1HumanAllGenesStranded.parquet
            ${{ env.TAUSO_DATA_DIR }}/OmicsExpressionTPMLogp1HumanAllGenesStranded.parquet.sha256
            ${{ env.TAUSO_DATA_DIR }}/processed_expression
            ${{ env.TAUSO_DATA_DIR }}/cai_weights.json
          key: depmap-25Q3-v3

      - name: Setup DepMap
        run: tauso setup-depmap

      - name: Cache human tGCN
        uses: actions/cache@v4
        with:
          path: ${{ env.TAUSO_DATA_DIR }}/human_tgcn_hsapi38.csv
          key: human-tgcn-hsapi38-v1

      - name: Build cell context (default cohort + expression + CAI weights + tGCN)
        run: tauso build-cell-context

      - name: Cache rRNA reference
        uses: actions/cache@v4
        with:
          path: ${{ env.TAUSO_DATA_DIR }}/rrna_reference.fa
          key: rrna-reference-21071791

      - name: Setup rRNA reference (off-target)
        run: tauso setup-rrna

      - name: Cache model
        uses: actions/cache@v4
        with:
          path: ${{ env.TAUSO_DATA_DIR }}/models
          key: tauso-model-21382921-2a0b5bea

      - name: Setup model (tauso_score)
        run: tauso setup-model

      - name: Run tests
        run: micromamba run -n tauso pytest -vvvs --durations=0 --n-jobs 4
