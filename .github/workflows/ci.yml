name: Build and Test Python

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest ]
    runs-on: ${{ matrix.os }}

    env:
      TAUSO_DATA_DIR: /home/runner/.tauso_data

    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      # Now we have ~30GB free space

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Compute env hash
        id: envhash
        run: echo "hash=$(cat environment.yml | sha256sum | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Create Data Directory
        run: mkdir -p ${{ env.TAUSO_DATA_DIR }}

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-file: environment.yml
          environment-name: tauso
          cache-downloads: true
          cache-environment: true
          cache-environment-key: ${{ runner.os }}-tauso-${{ steps.envhash.outputs.hash }}

      - name: Install Dev Dependencies
        run: micromamba install -n tauso -f environment-dev.yml -y

      - name: Install tauso
        run: micromamba run -n tauso pip install -e .

      - name: Install raccess
        run: tauso install-raccess

      - name: Cache Genome Database
        id: cache-genome
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.TAUSO_DATA_DIR }}/GRCh38.db
            ${{ env.TAUSO_DATA_DIR }}/GRCh38.db.bak
            ${{ env.TAUSO_DATA_DIR }}/GRCh38.db.success
            ${{ env.TAUSO_DATA_DIR }}/GRCh38.fa
            ${{ env.TAUSO_DATA_DIR }}/GRCh38.fa.fai
            ${{ env.TAUSO_DATA_DIR }}/GRCh38.gtf
          key: ${{ runner.os }}-tauso.genome-GRCh38-v2

      - name: Install genome
        run: tauso setup-genome

      - name: Cache Bowtie Index
        id: cache-bowtie
        uses: actions/cache@v4
        with:
          path: ${{ env.TAUSO_DATA_DIR }}/GRCh38_bowtie_index
          key: ${{ runner.os }}-tauso.bowtie-GRCh38-v1

      - name: Setup Bowtie
        run: tauso setup-bowtie

      - name: Process Oligo Data
        run: python -m notebooks.competitors.oligo_ai.find_gene_from_context

      - name: Index Oligo Data
        run: python -m notebooks.utils.data

      - name: Run tests
        run: micromamba run -n tauso pytest -vvvs