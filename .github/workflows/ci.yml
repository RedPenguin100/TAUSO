name: Build and Test Python

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * *' # 3:00 AM UTC -> 6:00 AM Israel Daylight Time

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-file: conda-linux-64-dev.lock
          environment-name: tauso
          cache-downloads: true
          cache-environment: true
          cache-environment-key: ${{ runner.os }}-tauso-${{ hashFiles('conda-linux-64-dev.lock') }}

      - name: Run Ruff Check (Linting)
        run: micromamba run -n tauso ruff check src/

      - name: Run Ruff Format (Style)
        run: micromamba run -n tauso ruff format --check src/

  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest ]
    runs-on: ${{ matrix.os }}

    env:
      TAUSO_DATA_DIR: /home/runner/.tauso_data

    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Free Disk Space
        # Intentionally no `wait` — deletions run in the background while
        # checkout and micromamba proceed. This is safe in practice because
        # by the time Bowtie cache restore needs the space, the rms are done.
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet &
          sudo rm -rf /usr/local/lib/android &
          sudo rm -rf /opt/ghc &
          sudo rm -rf /opt/hostedtoolcache/CodeQL &
          sudo rm -rf /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" &
          echo "Deletions running in background. Current disk:"
          df -h /

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Create Data Directory
        run: mkdir -p "${{ env.TAUSO_DATA_DIR }}"

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-file: conda-linux-64-dev.lock
          environment-name: tauso
          cache-downloads: true
          cache-environment: true
          cache-environment-key: ${{ runner.os }}-tauso-${{ hashFiles('conda-linux-64-dev.lock') }}

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-uv-

      - name: Install tauso
        run: micromamba run -n tauso uv pip install -e ".[dev]"

      - name: Install raccess
        run: tauso setup-raccess

      - name: Cache Genome Database
        id: cache-genome
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.TAUSO_DATA_DIR }}/GRCh38.gff3.db
            ${{ env.TAUSO_DATA_DIR }}/GRCh38.gff3.db.success
            ${{ env.TAUSO_DATA_DIR }}/GRCh38.gtf.db
            ${{ env.TAUSO_DATA_DIR }}/GRCh38.gtf.db.success
            ${{ env.TAUSO_DATA_DIR }}/GRCh38.fa
            ${{ env.TAUSO_DATA_DIR }}/GRCh38.fa.fai
            ${{ env.TAUSO_DATA_DIR }}/GRCh38.gtf.gz
          key: ${{ runner.os }}-tauso.genome-GRCh38-v4

      - name: Install genome
        run: tauso setup-genome

      - name: Cache and Setup Bowtie
        uses: ./.github/actions/setup-bowtie-cached
        with:
          os: ${{ runner.os }}
          data_dir: ${{ env.TAUSO_DATA_DIR }}

      - name: Process Oligo Data
        run: python -m notebooks.data.OligoAI.assign_canonical_gene

      - name: Index Oligo Data
        run: python -m notebooks.utils.data

      - name: Cache mRNA Half Life
        uses: actions/cache@v4
        with:
          path: ${{ env.TAUSO_DATA_DIR }}/mrna_half_life.csv.gz
          key: mrna-halflife-v1

      - name: Setup mRNA half life
        run: tauso setup-mrna-halflife

      - name: Cache DepMap Data
        id: cache-depmap
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.TAUSO_DATA_DIR }}/Model.csv
            ${{ env.TAUSO_DATA_DIR }}/Model.csv.sha256
            ${{ env.TAUSO_DATA_DIR }}/OmicsProfiles.csv
            ${{ env.TAUSO_DATA_DIR }}/OmicsProfiles.csv.sha256
            ${{ env.TAUSO_DATA_DIR }}/OmicsExpressionTPMLogp1HumanAllGenesStranded.parquet
            ${{ env.TAUSO_DATA_DIR }}/OmicsExpressionTPMLogp1HumanAllGenesStranded.csv.sha256
            ${{ env.TAUSO_DATA_DIR }}/processed_expression
            ${{ env.TAUSO_DATA_DIR }}/cai_weights.json
          key: depmap-25Q3-v2

      - name: Setup DepMap
        run: tauso setup-depmap

      - name: Build cell context (default cohort + expression + CAI weights)
        run: tauso build-cell-context

      - name: Run tests
        run: micromamba run -n tauso pytest -vvvs --durations=0 --n-jobs 4 --dist=loadfile
